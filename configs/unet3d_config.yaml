data:
  data_root: data
  patch_size: 128
  num_classes: 3
  val_scroll_ids: ["26002"]
  num_workers: 4
  pin_memory: true
  patches_per_volume: 2

model:
  in_channels: 1
  num_classes: 3
  base_channels: 32
  channel_multipliers: [1, 2, 4, 8, 10]
  num_conv_per_stage: 2
  norm: instance
  activation: leaky_relu
  deep_supervision: true

training:
  batch_size_per_gpu: 4
  epochs: 4000
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.00001
  scheduler: cosine_warm_restarts
  T_0: 400
  T_mult: 1
  eta_min: 0.000001
  warmup_epochs: 50
  amp: true
  grad_clip: 12.0

loss:
  dice_weight: 1.0
  ce_weight: 1.0
  class_weights: [1.0, 8.0, 1.0]
  smooth: 0.00001

augmentation:
  random_flip: true
  random_rot90: true
  intensity_shift_range: [-0.1, 0.1]
  intensity_scale_range: [0.9, 1.1]
  gaussian_noise_std: 0.03
  gamma_range: [0.7, 1.5]
  surface_bias_prob: 0.5

logging:
  wandb_project: vesuvius-surface-3dunet
  log_every_n_steps: 10
  val_every_n_epochs: 50
  save_every_n_epochs: 200

checkpoint:
  save_dir: checkpoints
  resume_from: null
